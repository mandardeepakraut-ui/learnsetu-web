<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Pill Container with Blue Stroke -->
  <rect x="10" y="10" width="300" height="64" rx="32" fill="#FFFFFF" stroke="#0067FF" stroke-width="4" filter="url(#glow)" />

  <!-- Left Blue Half Pill -->
  <path d="M 42,12 L 160,12 L 160,72 L 42,72 A 30,30 0 0,1 12,42 A 30,30 0 0,1 42,12 Z" fill="#0067FF" />

  <!-- Text "Learn" in White -->
  <text x="35" y="52" font-family="'Outfit', 'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="34" fill="#FFFFFF">Learn</text>

  <!-- Text "setu" in Electric Blue -->
  <text x="175" y="52" font-family="'Outfit', 'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="34" fill="#0067FF">setu</text>

  <!-- Tagline Subtitle -->
  <text x="160" y="100" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-weight="700" font-size="14" fill="#0067FF">Bridging you to your next tech job</text>
</svg>
